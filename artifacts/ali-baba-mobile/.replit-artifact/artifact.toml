kind = "mobile"
previewPath = "/mobile/"
title = "АЛИ-БАБА И 40 КЛАДОВ"
version = "1.0.0"
id = "artifacts/ali-baba-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 25190

[services.development]
run = "pnpm --filter @workspace/ali-baba-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ali-baba-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ali-baba-mobile", "run", "serve" ]

[services.env]
PORT = "25190"
BASE_PATH = "/mobile/"
